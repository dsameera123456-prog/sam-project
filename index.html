<!DOCTYPE html>
<html>
<head>
  <title>CleanConnect - Sanitation Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>CleanConnect</h1>
    <p>Sanitation & Hygiene Complaint System</p>
  </header>

  <section class="box">

    <h2>Raise Complaint</h2>

    <input type="text" id="title" placeholder="Complaint Title">
    <input type="text" id="location" placeholder="Location">
    <textarea id="desc" placeholder="Describe the issue"></textarea>

    <button onclick="addComplaint()">Submit Complaint</button>

  </section>

  <section class="box">

    <h2>Complaints List</h2>

    <ul id="list"></ul>

  </section>

  <script src="script.js"></script>
</body>
</html>
